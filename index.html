<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinning 3D Text</title>
<link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
<div class="container">
  <div class="cube">
    <div class="face front"><span>C</span></div>
    <div class="face back"><span>O</span></div>
    <div class="face left"><span>O</span></div>
    <div class="face right"><span>P</span></div>
    <div class="face top"><span>E</span></div>
    <div class="face bottom"><span>R</span></div>
  </div>
</div>
</body>
</html>
